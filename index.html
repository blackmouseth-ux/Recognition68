<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GSB Lottery Update - รายการเลขที่สลากออมสิน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #071a44;
      --navy-2: #0b2a68;
      --red: #9f1239;
      --red-2: #be123c;
      --blue: #1d4ed8;
      --sky: #eff6ff;
      --paper: #ffffff;
      --ink: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --soft: #f8fafc;
      --green: #0f766e;
      --shadow: 0 18px 50px rgba(7, 26, 68, .12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Prompt', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, .10), transparent 34%),
        radial-gradient(circle at 88% 12%, rgba(190, 18, 60, .10), transparent 28%),
        var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }
    .page { max-width: 1320px; margin: 0 auto; padding: 28px 22px 56px; }
    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 36px;
      padding: 34px;
      color: white;
      background:
        linear-gradient(135deg, rgba(7, 26, 68, .98), rgba(11, 42, 104, .95) 55%, rgba(159, 18, 57, .92)),
        var(--navy);
      box-shadow: var(--shadow);
      isolation: isolate;
    }
    .hero:before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      right: -130px; top: -180px;
      z-index: -1;
    }
    .hero:after {
      content: 'GSB';
      position: absolute;
      right: 30px;
      bottom: -36px;
      font-size: clamp(70px, 13vw, 180px);
      font-weight: 800;
      letter-spacing: -.08em;
      color: rgba(255,255,255,.06);
      z-index: -1;
    }
    .eyebrow { display:inline-flex; gap:10px; align-items:center; padding:8px 14px; border:1px solid rgba(255,255,255,.22); border-radius:999px; background:rgba(255,255,255,.10); backdrop-filter: blur(10px); font-size:14px; }
    .dot { width:9px; height:9px; border-radius:999px; background:#fb7185; box-shadow:0 0 0 6px rgba(251,113,133,.16); }
    h1 { margin: 22px 0 10px; font-size: clamp(32px, 5vw, 62px); line-height: 1.04; letter-spacing: -.04em; }
    .hero p { margin:0; max-width:760px; color:rgba(255,255,255,.78); font-size: clamp(15px, 2vw, 19px); }
    .hero-actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:26px; }
    .pill { border:1px solid rgba(255,255,255,.20); background:rgba(255,255,255,.12); color:#fff; padding:10px 14px; border-radius:999px; font-weight:600; }
    .section { margin-top:24px; }
    .panel { background:rgba(255,255,255,.92); border:1px solid var(--line); border-radius: var(--radius-xl); box-shadow:var(--shadow); overflow:hidden; }
    .toolbar { display:grid; grid-template-columns: 1.1fr .9fr auto; gap:14px; padding:18px; align-items:center; border-bottom:1px solid var(--line); background:linear-gradient(180deg, #fff, #f8fafc); }
    .field { position:relative; }
    label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
    input, select { width:100%; border:1px solid #dbe3ef; border-radius:16px; padding:14px 14px; font: inherit; outline:none; background:#fff; color:var(--ink); transition:.2s; }
    input:focus, select:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(29,78,216,.10); }
    .button { align-self:end; cursor:pointer; border:0; padding:15px 18px; border-radius:16px; font:inherit; font-weight:800; color:#fff; background:linear-gradient(135deg, var(--navy), var(--red)); box-shadow:0 12px 26px rgba(159,18,57,.20); }
    .table-wrap { overflow:auto; max-height:620px; }
    table { width:100%; border-collapse:separate; border-spacing:0; min-width:980px; }
    thead th { position:sticky; top:0; z-index:2; background:var(--navy); color:#fff; text-align:left; font-size:12px; letter-spacing:.02em; padding:14px 13px; white-space:nowrap; }
    tbody td { padding:14px 13px; border-bottom:1px solid var(--line); vertical-align:top; background:#fff; }
    tbody tr:hover td { background:#f8fbff; }
    .name { font-weight:800; color:var(--navy); }
    .sub { color:var(--muted); font-size:12px; margin-top:2px; }
    .lottery { font-weight:800; letter-spacing:.06em; color:var(--red); background:#fff1f2; border:1px solid #ffe4e6; border-radius:999px; padding:7px 10px; display:inline-block; }
    .tag { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:7px 10px; font-size:12px; font-weight:700; background:#eff6ff; color:#1d4ed8; border:1px solid #dbeafe; }
    .tag.active { color:var(--green); background:#ecfdf5; border-color:#ccfbf1; }
    .tag.inactive { color:var(--red); background:#fff1f2; border-color:#ffe4e6; }
    .money { font-weight:800; color:var(--navy); text-align:right; white-space:nowrap; }
    .empty { display:none; text-align:center; padding:42px; color:var(--muted); }

    .dashboard-wrap { padding:18px; border-bottom:1px solid var(--line); background:#fff; }
    .dashboard-title { display:flex; justify-content:space-between; align-items:flex-end; gap:14px; margin-bottom:14px; }
    .dashboard-title h2 { margin:0; color:var(--navy); font-size:clamp(22px, 3vw, 34px); letter-spacing:-.03em; }
    .dashboard-title p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .dashboard-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:14px; }
    .bu-card { position:relative; overflow:hidden; cursor:pointer; border:1px solid #dde5f0; border-radius:24px; padding:18px 20px; background:linear-gradient(180deg, #fff, #f8fafc); box-shadow:0 10px 30px rgba(7,26,68,.08); transition:.18s ease; min-height:170px; }
    .bu-card:before { content:''; position:absolute; left:0; right:0; top:0; height:6px; background:linear-gradient(90deg, var(--navy), var(--blue), var(--red)); }
    .bu-card:hover, .bu-card:focus-visible { transform:translateY(-3px); box-shadow:0 18px 44px rgba(7,26,68,.14); border-color:#c8d5e8; outline:none; }
    .bu-name { color:var(--navy); font-weight:800; font-size:16px; line-height:1.35; padding-right:10px; min-height:44px; }
    .bu-stats { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; margin-top:18px; }
    .bu-stat { border:1px solid #e5edf6; border-radius:16px; padding:11px 10px; background:#fff; }
    .bu-stat b { display:block; color:var(--navy); font-size:22px; line-height:1; }
    .bu-stat span { display:block; margin-top:6px; color:var(--muted); font-size:11px; font-weight:700; text-transform:uppercase; }
    .bu-stat.active b { color:var(--green); }
    .bu-stat.inactive b { color:var(--red); }
    .bu-stat.pending b { color:#b45309; }
    .bu-card-hint { margin-top:14px; color:var(--blue); font-size:12px; font-weight:800; }
    .record-stack { display:grid; gap:12px; }
    .record-card { border:1px solid var(--line); border-radius:20px; padding:14px 15px; background:linear-gradient(180deg, #fff, #f8fafc); }
    .record-card-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:10px; }
    .record-card-title { color:var(--navy); font-weight:800; font-size:16px; }
    .record-mini-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:8px 12px; font-size:13px; }
    .record-mini-grid b { color:var(--muted); font-size:11px; display:block; margin-bottom:2px; }
    @media (max-width: 1120px) { .dashboard-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 720px) { .dashboard-grid { grid-template-columns:1fr; } .bu-stats { grid-template-columns:repeat(2, minmax(0, 1fr)); } .record-mini-grid { grid-template-columns:1fr; } }
    .footer-note { color:var(--muted); font-size:12px; margin-top:14px; text-align:right; }

    tbody tr { cursor:pointer; transition:.18s ease; }
    tbody tr:focus-visible td { outline:3px solid rgba(29,78,216,.24); outline-offset:-3px; }
    .click-hint { color:var(--blue); font-size:11px; font-weight:700; margin-top:5px; }
    .modal-backdrop { position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:18px; background:rgba(7,26,68,.58); backdrop-filter:blur(8px); z-index:50; }
    .modal-backdrop.show { display:flex; }
    .modal-card { width:min(1040px, 100%); max-height:88vh; overflow:auto; background:#fff; border:1px solid rgba(255,255,255,.6); border-radius:28px; box-shadow:0 28px 90px rgba(7,26,68,.28); }
    .modal-head { position:sticky; top:0; z-index:1; padding:22px 24px; color:#fff; background:linear-gradient(135deg, var(--navy), var(--navy-2) 55%, var(--red)); display:flex; justify-content:space-between; gap:16px; align-items:flex-start; }
    .modal-kicker { font-size:12px; opacity:.78; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
    .modal-title { margin:5px 0 0; font-size:clamp(22px, 4vw, 34px); line-height:1.15; font-weight:800; }
    .modal-subtitle { margin-top:8px; color:rgba(255,255,255,.78); font-size:14px; }
    .close-btn { border:1px solid rgba(255,255,255,.25); width:42px; height:42px; border-radius:999px; cursor:pointer; background:rgba(255,255,255,.12); color:#fff; font-size:26px; line-height:1; }
    .modal-body { padding:22px 24px 26px; }
    .detail-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:12px; }
    .detail-item { border:1px solid var(--line); border-radius:18px; padding:14px 15px; background:linear-gradient(180deg, #fff, #f8fafc); }
    .detail-label { color:var(--muted); font-size:12px; font-weight:800; margin-bottom:5px; }
    .detail-value { color:var(--ink); font-size:15px; font-weight:600; word-break:break-word; }
    .detail-value.strong { color:var(--red); font-size:18px; letter-spacing:.04em; }
    .detail-wide { grid-column:1 / -1; }
    @media (max-width: 720px) { .detail-grid { grid-template-columns:1fr; } .modal-head { padding:20px; } .modal-body { padding:18px; } }
    @media (max-width: 980px) { .toolbar { grid-template-columns:1fr; } .button { width:100%; } }
    @media (max-width: 560px) { .page { padding:16px 12px 36px; } .hero { padding:24px; border-radius:26px; } }
  </style>
</head>

            <div class="bu-stat active"><b>${item.active}</b><span>ACTIVE</span></div>
            <div class="bu-stat inactive"><b>${item.inactive}</b><span>INACTIVE</span></div>
            <div class="bu-stat pending"><b>${item.pending}</b><span>รอ Confirm</span></div>
          </div>
          <div class="bu-card-hint">คลิกเพื่อดูข้อมูลทั้งหมด</div>
        </article>
      `).join('');
    }
    function getFilteredRecords() {
      const q = state.search.trim().toLowerCase();
      return records.filter(r => {
        const matchBu = state.bu === 'all' || r.bu === state.bu;
        const hay = [r.no, r.code, r.bu, r.name, r.position, r.department, r.award, r.lotteryNo, r.lotteryType, r.status].join(' ').toLowerCase();
        const matchSearch = !q || hay.includes(q);
        return matchBu && matchSearch;
      });
    }
    function renderOptions() {
      const select = byId('buFilter');
      const buCounts = records.reduce((acc, r) => {
        acc[r.bu] = (acc[r.bu] || 0) + 1;
        return acc;
      }, {});
      Object.keys(buCounts).sort((a, b) => compactBu(a).localeCompare(compactBu(b), 'th')).forEach(bu => {
        const opt = document.createElement('option');
        opt.value = bu;
        opt.textContent = `${compactBu(bu)} (${buCounts[bu]})`;
        select.appendChild(opt);
      });
    }
    function renderTable(items) {
      const tbody = byId('tableBody');
      tbody.innerHTML = items.map(r => `<tr data-no="${escapeHtml(r.no)}" tabindex="0" title="คลิกเพื่อดูข้อมูลทั้งหมด">
        <td>${escapeHtml(r.no)}</td>
        <td><div class="name">${escapeHtml(r.name)}</div><div class="sub">รหัส ${escapeHtml(r.code)} • ${escapeHtml(r.position)}</div><div class="click-hint">คลิกเพื่อดูข้อมูลทั้งหมด</div></td>
        <td><b>${escapeHtml(compactBu(r.bu))}</b><div class="sub">${escapeHtml(r.department)}</div></td>
        <td>${escapeHtml(r.award)}</td>
        <td><span class="lottery">${escapeHtml(r.lotteryNo)}</span></td>
        <td><span class="tag">${escapeHtml(r.lotteryType)}</span></td>
        <td><span class="tag ${statusClass(r.status)}">${escapeHtml(r.status || '-')}</span></td>
        <td class="money">${money.format(Number(r.prize || 0))}</td>
      </tr>`).join('');
      byId('emptyTable').style.display = items.length ? 'none' : 'block';
    }

    const modal = byId('detailModal');
    const detailGrid = byId('detailGrid');
    const closeModalBtn = byId('closeModalBtn');
    const detailFields = [
      ['ลำดับ', 'no'],
      ['รหัสพนักงาน', 'code'],
      ['ชื่อผู้ได้รับรางวัล', 'name'],
      ['ตำแหน่ง', 'position'],
      ['BU / บริษัท', 'bu', 'wide'],
      ['สังกัด / แผนก', 'department', 'wide'],
      ['ชื่อรางวัล', 'award'],
      ['เลขที่สลาก', 'lotteryNo', 'strong'],
      ['ประเภทสลาก', 'lotteryType'],
      ['สถานะ', 'status', 'wide'],
      ['เงินรางวัล', 'prizeText']
    ];

    function openBuDetail(bu) {
      const items = records.filter(r => r.bu === bu);
      if (!items.length) return;
      const summary = getBuSummary().find(x => x.bu === bu);
      byId('modalKicker').textContent = 'รายละเอียด Dashboard BU';
      byId('modalTitle').textContent = compactBu(bu);
      byId('modalSubtitle').textContent = `${summary.total} รายการ • ACTIVE ${summary.active} • INACTIVE ${summary.inactive} • รอ Confirm ${summary.pending}`;
      detailGrid.innerHTML = `<div class="detail-item detail-wide">
        <div class="detail-label">ข้อมูลทั้งหมดของ BU</div>
        <div class="record-stack">${items.map(r => `
          <div class="record-card">
            <div class="record-card-head">
              <div><div class="record-card-title">#${escapeHtml(r.no)} ${escapeHtml(r.name || '-')}</div><div class="sub">รหัส ${escapeHtml(r.code || '-')} • ${escapeHtml(r.position || '-')}</div></div>
              <span class="tag ${statusClass(r.status)}">${escapeHtml(r.status || '-')}</span>
            </div>
            <div class="record-mini-grid">
              <div><b>สังกัด / แผนก</b>${escapeHtml(r.department || '-')}</div>
              <div><b>ชื่อรางวัล</b>${escapeHtml(r.award || '-')}</div>
              <div><b>เลขที่สลาก</b><span class="lottery">${escapeHtml(r.lotteryNo || '-')}</span></div>
              <div><b>ประเภทสลาก</b>${escapeHtml(r.lotteryType || '-')}</div>
              <div><b>เงินรางวัล</b>${escapeHtml(r.prizeText || money.format(Number(r.prize || 0)))}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>`;
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
      closeModalBtn.focus();
    }
    function openDetail(no) {
      const record = records.find(r => String(r.no) === String(no));
      if (!record) return;
      byId('modalKicker').textContent = `รายการลำดับที่ ${record.no}`;
      byId('modalTitle').textContent = record.name || '-';
      byId('modalSubtitle').textContent = `${record.award || '-'} • ${compactBu(record.bu || '-')}`;
      detailGrid.innerHTML = detailFields.map(([label, key, mode]) => {
        const raw = key === 'prizeText' ? (record.prizeText || money.format(Number(record.prize || 0))) : (record[key] || '-');
        const wide = mode === 'wide' ? ' detail-wide' : '';
        const strong = mode === 'strong' ? ' strong' : '';
        return `<div class="detail-item${wide}"><div class="detail-label">${escapeHtml(label)}</div><div class="detail-value${strong}">${escapeHtml(raw)}</div></div>`;
      }).join('');
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
      closeModalBtn.focus();
    }
    function closeDetail() {
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }

    function render() {
      const items = getFilteredRecords();
      renderTable(items);
    }
    byId('searchInput').addEventListener('input', e => { state.search = e.target.value; render(); });
    byId('buFilter').addEventListener('change', e => { state.bu = e.target.value; render(); });
    byId('resetBtn').addEventListener('click', () => { state.search = ''; state.bu = 'all'; byId('searchInput').value = ''; byId('buFilter').value = 'all'; render(); });


    byId('buDashboard').addEventListener('click', e => {
      const card = e.target.closest('.bu-card[data-bu]');
      if (card) openBuDetail(card.dataset.bu);
    });
    byId('buDashboard').addEventListener('keydown', e => {
      const card = e.target.closest('.bu-card[data-bu]');
      if ((e.key === 'Enter' || e.key === ' ') && card) {
        e.preventDefault();
        openBuDetail(card.dataset.bu);
      }
    });

    byId('tableBody').addEventListener('click', e => {
      const row = e.target.closest('tr[data-no]');
      if (row) openDetail(row.dataset.no);
    });
    byId('tableBody').addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ' ') && e.target.closest('tr[data-no]')) {
        e.preventDefault();
        openDetail(e.target.closest('tr[data-no]').dataset.no);
      }
    });
    closeModalBtn.addEventListener('click', closeDetail);
    modal.addEventListener('click', e => { if (e.target === modal) closeDetail(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('show')) closeDetail(); });
    renderDashboard();
    renderOptions();
    render();
  </script>
</body>
</html>
